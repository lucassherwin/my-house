services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    ports:
      - "${PORT:-3000}:3000"
    environment:
      RAILS_ENV: development
      NODE_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SHAKAPACKER_DEV_SERVER_HOST: webpack
      SHAKAPACKER_DEV_SERVER_PORT: ${SHAKAPACKER_DEV_SERVER_PORT:-3035}
    depends_on:
      postgres:
        condition: service_healthy

  webpack:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/shakapacker-dev-server
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    ports:
      - "${SHAKAPACKER_DEV_SERVER_PORT:-3035}:3035"
    environment:
      NODE_ENV: development
      SHAKAPACKER_DEV_SERVER_HOST: "0.0.0.0"
      SHAKAPACKER_DEV_SERVER_PORT: ${SHAKAPACKER_DEV_SERVER_PORT:-3035}

  server-bundle:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/shakapacker-watch --watch
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    environment:
      NODE_ENV: development
      SERVER_BUNDLE_ONLY: "true"

volumes:
  postgres_data:
  bundle:
